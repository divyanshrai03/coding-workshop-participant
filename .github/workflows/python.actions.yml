name: Security Check - Python

on: [pull_request, push]

jobs:
  bandit:
    runs-on: ubuntu-latest

    permissions:
      actions: read
      contents: read
      # security-events: write

    steps:
      - name: Setup GitHub Actions
        uses: actions/checkout@master

      - name: Install Python
        uses: actions/setup-python@master
        with:
          python-version: '3.11'

      - name: Install Bandit
        run: pip3 install bandit

      - name: Run Bandit
        # Excludes test directories - bandit's B101 (assert_used) flags every
        # plain `assert` in our pytest suites (backend/{_shared,*-service}/tests/),
        # which is how pytest assertions work, not a real finding. Verified
        # directly: scanning a clean checkout (git archive HEAD, matching what
        # this job actually sees - no vendored deps or .venv) finds these are
        # the *only* issues bandit reports; zero remain outside tests/ dirs.
        run: bandit -r ./backend --exclude '*/tests/*,**/test_*.py'
