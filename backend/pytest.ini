[pytest]
; _shared is the single source of truth for validation.py/auth.py/http_utils.py/
; router.py/errors.py/db.py - deploy-backend.sh copies these byte-for-byte into every
; service's _lib/ (verified identical across all 4 services via `diff`). Testing them
; once against _shared covers every service without 4x duplicate test suites.
pythonpath = _shared
testpaths =
    _shared/tests
    auth-service/tests
    projects-service/tests
    resources-service/tests
    budgets-service/tests
python_files = test_*.py
addopts = -ra
